<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Replacer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="header">
        <h1 id="enabled-status">Replacement: ON</h1>
        <button id="enabled-toggle" class="toggle-row" type="button" aria-pressed="true">
          <span class="track" aria-hidden="true">
            <span class="knob"></span>
          </span>
        </button>
      </header>

      <form id="replacement-form">
        <input id="find" type="text" placeholder="Word to replace" autocomplete="off" required>
        <input id="replace" type="text" placeholder="Replacement" autocomplete="off">
        <button type="submit">Add</button>
      </form>

      <form id="bulk-form" class="bulk-form">
        <textarea id="bulk-replacements" placeholder="word:replacement word" rows="4"></textarea>
        <button type="submit">Import</button>
      </form>

      <ul id="replacement-list" aria-label="Replacement words"></ul>
    </main>

    <template id="replacement-template">
      <li>
        <span class="pair"></span>
        <button class="remove" type="button" aria-label="Remove replacement">Remove</button>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
